[phases.setup]
nixPkgs = ["zbar", "libzbar", "python312", "python312Packages.pip"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate && gunicorn inventario_project.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
